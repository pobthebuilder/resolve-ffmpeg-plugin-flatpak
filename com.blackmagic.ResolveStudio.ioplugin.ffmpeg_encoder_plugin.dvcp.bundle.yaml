####
# Flatpak Configuration for building DaVinci Resolve
#
####
id: com.blackmagic.ResolveStudio.ioplugin.ffmpeg_encoder_plugin_dvcp_bundle
branch: '1.0'
runtime: com.blackmagic.ResolveStudio
runtime-version: &runtime-version 'master'
sdk: org.freedesktop.Sdk//24.08
build-extension: true
build-options:
  prefix: /app/IOPlugins/ffmpeg_encoder_plugin.dvcp.bundle
  prepend-path: /app/IOPlugins/ffmpeg_encoder_plugin.dvcp.bundle/Contents/Linux-x86-64/
modules:
  - name: ffmpeg_encoder_plugin.dvcp.bundle
    buildsystem: cmake
    build-commands:
      - "mkdir -p ${FLATPAK_DEST}/Contents/Linux-x86-64/"
      - "install -Dm755 ffmpeg_encoder_plugin.dvcp -t ${FLATPAK_DEST}/Contents/Linux-x86-64"
    no-make-install: true
    sources:
      - type: git
        url: https://github.com/EdvinNilsson/ffmpeg_encoder_plugin.git
        branch: main
